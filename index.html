<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Morning Round 5R Checklist - Aplikasi Digitalisasi Morning Round berbasis 5R untuk industri" />
    <meta name="theme-color" content="#000000" />
    <title>Morning Round 5R | Checklist</title>
    
    <!-- Tailwind CSS Play CDN for Neo-Brutalism Prototype -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jsPDF for PDF Export (Prototype) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
      
      :root {
        --brutal-black: #000000;
        --brutal-white: #FFFFFF;
        --brutal-yellow: #FFEB3B;
        --brutal-green: #22C55E;
        --brutal-red: #EF4444;
        --brutal-blue: #3B82F6;
        --brutal-pink: #EC4899;
        --brutal-bg: #FFFDF0;
        --brutal-card: #FFFFFF;
      }
      
      body {
        font-family: 'Inter', system_ui, sans-serif;
      }
      
      .font-display {
        font-family: 'Space Grotesk', 'Inter', sans-serif;
        font-weight: 700;
      }

      /* NEO-BRUTALISM CORE STYLES */
      .brutal-card {
        background-color: var(--brutal-card);
        border: 4px solid var(--brutal-black);
        box-shadow: 6px 6px 0 var(--brutal-black);
        transition: transform 0.1s ease, box-shadow 0.1s ease;
      }
      
      .brutal-card:active {
        transform: translate(2px, 2px);
        box-shadow: 4px 4px 0 var(--brutal-black);
      }

      .brutal-btn {
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border: 4px solid var(--brutal-black);
        box-shadow: 4px 4px 0 var(--brutal-black);
        transition: all 0.1s ease;
        position: relative;
      }
      
      .brutal-btn:hover {
        transform: translate(-1px, -1px);
        box-shadow: 5px 5px 0 var(--brutal-black);
      }
      
      .brutal-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--brutal-black);
      }

      .brutal-btn-primary {
        background-color: var(--brutal-yellow);
        color: var(--brutal-black);
      }
      
      .brutal-btn-green {
        background-color: var(--brutal-green);
        color: white;
      }
      
      .brutal-btn-red {
        background-color: var(--brutal-red);
        color: white;
      }
      
      .brutal-btn-secondary {
        background-color: white;
        color: var(--brutal-black);
      }

      .brutal-input {
        border: 4px solid var(--brutal-black);
        background-color: white;
        font-weight: 600;
        transition: all 0.1s ease;
      }
      
      .brutal-input:focus {
        outline: none;
        box-shadow: 4px 4px 0 var(--brutal-black);
        transform: translate(-1px, -1px);
      }

      .brutal-select {
        border: 4px solid var(--brutal-black);
        background-color: white;
        font-weight: 700;
        text-transform: uppercase;
      }

      .brutal-badge {
        border: 3px solid var(--brutal-black);
        font-weight: 900;
        text-transform: uppercase;
        font-size: 0.75rem;
        padding: 2px 10px;
        box-shadow: 2px 2px 0 var(--brutal-black);
      }

      .section-header {
        font-size: 1.75rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -1px;
        border-bottom: 4px solid var(--brutal-black);
        padding-bottom: 8px;
        display: inline-block;
      }

      .neo-brutalist-shadow {
        box-shadow: 8px 8px 0 #000000;
      }

      .finding-card {
        border: 4px solid var(--brutal-black);
        background: white;
        box-shadow: 5px 5px 0 #000000;
      }

      .checklist-item {
        border: 3px solid var(--brutal-black);
        transition: all 0.1s ease;
      }

      .checklist-item.selected-yes {
        background-color: #dcfce7;
        border-color: #16a34a;
      }
      
      .checklist-item.selected-no {
        background-color: #fee2e2;
        border-color: #ef4444;
      }

      .nav-tab {
        font-weight: 900;
        text-transform: uppercase;
        border-bottom: 4px solid transparent;
      }
      
      .nav-tab.active {
        border-bottom: 4px solid var(--brutal-black);
        background-color: var(--brutal-yellow);
      }

      .stat-card {
        background: white;
        border: 4px solid #000;
        box-shadow: 5px 5px 0 #000;
      }

      .empty-state {
        border: 4px dashed #000;
        background: #fffdf0;
      }

      .brutal-toast {
        border: 4px solid #000;
        box-shadow: 4px 4px 0 #000;
        animation: slideIn 0.2s ease forwards;
      }

      @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      .brutal-label {
        font-weight: 900;
        text-transform: uppercase;
        font-size: 0.875rem;
        letter-spacing: 1px;
      }

      .five-r-item {
        font-weight: 800;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body class="bg-[#FFFDF0] text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
